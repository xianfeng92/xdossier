<!DOCTYPE html>
<html lang="{{LANG}}" data-reader="{{READER_DEFAULT}}" data-content-mode="{{CONTENT_MODE}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>{{STYLE_CSS}}</style>
</head>
<body>
{{READER_TOGGLE}}
<div class="reading-progress" aria-hidden="true"><div class="reading-progress-fill"></div></div>
<button class="toc-toggle" type="button" aria-label="{{TOC_TOGGLE_LABEL}}" aria-expanded="false">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
</button>
<div class="toc-backdrop" aria-hidden="true"></div>
<div class="layout">
  {{TOC_BLOCK}}
  <main>
    {{FRONTMATTER_CARD}}
    {{PREREQUISITE_CARD}}
    {{SEMANTIC_LENS_BLOCK}}
    {{CALLOUTS_BLOCK}}
    {{CONTENT_HTML}}
    <footer class="spec-footer">
      <span>{{FOOTER_META}}</span>
      <span>{{FOOTER_RENDERED_BY}}</span>
    </footer>
  </main>
</div>
<script>{{TOC_SCRIPT_JS}}</script>
<script>{{READER_TOGGLE_SCRIPT}}</script>
</body>
</html>
