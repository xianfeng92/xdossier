name: Feature request
description: Propose a new capability, semantic block, skill, or pedagogy element
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are most useful when they describe a real situation you ran into, not just an abstract capability. The "what would you do with this" section is the most important.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Describe the situation. What were you writing/reading? Where did the existing tool fall short?
      placeholder: |
        I have specs that include benchmark numbers. They render as a plain table, which gets ignored. I want them to stand out as KPI cards.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Be concrete — sketch the markdown input and the HTML output if possible.
      placeholder: |
        A new `kpi_card` semantic block. Trigger: frontmatter `benchmarks: [...]` or markdown `<!-- kpi: ... -->` directive. HTML: large number + label + delta.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or think about? Why is this proposal better?
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: What kind of feature is this?
      options:
        - New semantic block (e.g. kpi_card, timeline)
        - New pedagogy element (e.g. quiz, prereq variant)
        - New skill (rendering target)
        - New CLI flag / behavior
        - Tooling / integration (hook, watch, MCP)
        - Documentation / examples
        - Other
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: What would you do with this?
      description: Walk through a concrete scenario where this feature would help you. The more specific, the better.
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to help build this?
      options:
        - label: I can prototype it in a PR
        - label: I can write tests / docs for it
        - label: I can only describe — I'd need someone else to build
